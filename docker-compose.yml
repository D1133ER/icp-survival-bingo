services:
  postgres:
    image: postgres:16-alpine
    container_name: bingo-postgres
    environment:
      POSTGRES_DB: bingo
      POSTGRES_USER: bingo
      POSTGRES_PASSWORD: bingo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bingo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
